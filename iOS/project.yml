name: Babyfund
options:
  bundleIdPrefix: com.shimondeitel.babyfund
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Babyfund:
    type: application
    platform: iOS
    sources:
      - path: Babyfund
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.babyfund
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Babyfund/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BabyfundTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BabyfundTests
    dependencies:
      - target: Babyfund
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.babyfund.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BabyfundUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BabyfundUITests
    dependencies:
      - target: Babyfund
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.babyfund.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Babyfund:
    build:
      targets:
        Babyfund: all
        BabyfundTests: [test]
        BabyfundUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Babyfund.storekit
    test:
      config: Debug
      storeKitConfiguration: Babyfund.storekit
      targets:
        - BabyfundTests
        - BabyfundUITests
    archive:
      config: Release
